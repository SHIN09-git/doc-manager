services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8787:8787"
    env_file:
      - ./server/.env.production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mowen-backups:/var/backups/mowen

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: mowen
      POSTGRES_USER: mowen
      POSTGRES_PASSWORD: change-this-postgres-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mowen -d mowen"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mowen-postgres:/var/lib/postgresql/data

volumes:
  mowen-postgres:
  mowen-backups:
