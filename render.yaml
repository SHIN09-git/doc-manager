services:
  - type: web
    name: mowen-web
    runtime: static
    buildCommand: npm ci && npm run build:static
    staticPublishPath: ./dist

  - type: web
    name: mowen-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8787
      - key: STORE_DRIVER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: mowen-postgres
          property: connectionString
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_SECURE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_ENCRYPTION_SECRET
        generateValue: true
      - key: AI_PROXY_MODE
        value: live
      - key: AI_BASE_URL
        value: https://api.openai.com/v1
      - key: EMAIL_MODE
        value: webhook
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_RESEND_API_KEY
        sync: false
      - key: EMAIL_CALLBACK_TOKEN
        generateValue: true
      - key: PAYMENT_CHECKOUT_MODE
        value: disabled
      - key: PAYMENT_WEBHOOK_SECRET
        generateValue: true
      - key: MANUAL_PAYMENT_RECEIVER_NAME
        sync: false
      - key: MANUAL_PAYMENT_WECHAT_QR_URL
        sync: false
      - key: MANUAL_PAYMENT_ALIPAY_QR_URL
        sync: false
      - key: MANUAL_PAYMENT_PACKAGES
        sync: false
      - key: BACKUP_DIR
        value: /var/backups/mowen
      - key: BACKUP_ENCRYPTION_KEY
        generateValue: true
      - key: REQUEST_LOGGING
        value: "true"

databases:
  - name: mowen-postgres
    databaseName: mowen
    user: mowen
